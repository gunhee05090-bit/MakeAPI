<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="container">
    <form action="/restaurants/update" method="delete">
        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="수정할 장소의 이름을 입력하세요.">
            <label for="location"> 위치</label>
            <input type="text" id="location" name="location" placeholder="수정할 장소의 내용을 입력하세요.">
        </div>
        <button type="submit">삭제</button>
    </form>
</div> <!-- /container -->
</body>
</html>
